<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Tracker — Device Preview (dev)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #e9edf2; --panel: #ffffff; --ink: #161b20; --muted: #6c7882;
      --line: rgba(20,30,40,0.10); --sunken: rgba(120,130,140,0.12);
      --sunken-hover: rgba(120,130,140,0.20); --accent: #2563eb;
      --bezel: #0c0e12; --shadow: 0 1px 2px rgba(16,26,36,.06), 0 18px 50px rgba(16,26,36,.22);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117; --panel: #1b2129; --ink: #f0f3f6; --muted: #97a2ac;
        --line: rgba(255,255,255,0.10); --sunken: rgba(150,162,174,0.14);
        --sunken-hover: rgba(150,162,174,0.22); --accent: #5b9bff;
        --bezel: #000; --shadow: 0 1px 3px rgba(0,0,0,.5), 0 20px 56px rgba(0,0,0,.6);
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--ink);
      -webkit-font-smoothing: antialiased; display: flex; flex-direction: column;
    }

    /* ---- toolbar ---- */
    .toolbar {
      flex: none; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      padding: 10px 16px; background: var(--panel);
      border-bottom: 1px solid var(--line); box-shadow: 0 1px 0 var(--line);
      z-index: 2;
    }
    .brand { font-size: 13px; font-weight: 650; letter-spacing: -0.01em; }
    .brand .tag {
      margin-left: 8px; padding: 2px 7px; border-radius: 999px; font-size: 10.5px;
      font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      color: #fff; background: var(--accent);
    }
    .group { display: inline-flex; align-items: center; gap: 8px; }
    .group .lbl { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .seg { display: inline-flex; padding: 3px; background: var(--sunken); border-radius: 11px; }
    .seg button {
      border: 0; background: none; padding: 6px 13px; min-height: 30px; border-radius: 8px;
      font: inherit; font-size: 12.5px; font-weight: 550; color: var(--muted);
      cursor: pointer; transition: color .15s, background .15s;
    }
    .seg button:hover { color: var(--ink); }
    .seg button.active { color: var(--ink); background: var(--panel); box-shadow: 0 1px 3px rgba(16,26,36,.18); }

    .iconbtn {
      display: inline-grid; place-items: center; width: 32px; height: 32px;
      border: 1px solid var(--line); border-radius: 9px; background: var(--panel);
      color: var(--muted); cursor: pointer; transition: background .15s, color .15s;
    }
    .iconbtn:hover { background: var(--sunken); color: var(--ink); }
    .iconbtn:disabled { opacity: 0.35; cursor: default; }
    .spacer { flex: 1 1 auto; }
    .dims { font-size: 12px; font-weight: 550; color: var(--muted); font-variant-numeric: tabular-nums; }
    .toolbar a.raw { font-size: 12px; font-weight: 600; color: var(--accent); text-decoration: none; }
    .toolbar a.raw:hover { text-decoration: underline; }

    /* ---- stage ---- */
    .stage {
      flex: 1 1 auto; position: relative; min-height: 0; overflow: auto;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .stage::before {
      content: ""; position: absolute; inset: 0;
      background-image: radial-gradient(var(--line) 1px, transparent 1px);
      background-size: 22px 22px; opacity: 0.6; pointer-events: none;
    }
    /* .sizer reserves the post-scale footprint so flex centers the *visual* device */
    .sizer { flex: none; position: relative; }
    .device { position: absolute; top: 0; left: 0; transform-origin: top left; }

    /* desktop: plain framed window */
    .device.desktop {
      border-radius: 12px; overflow: hidden; box-shadow: var(--shadow);
      border: 1px solid var(--line); background: #000;
    }
    /* phone/tablet: bezel */
    .device.handheld {
      padding: 14px; border-radius: 44px; background: var(--bezel);
      box-shadow: var(--shadow), inset 0 0 0 2px rgba(255,255,255,0.06);
    }
    .device.handheld.tablet { padding: 18px; border-radius: 30px; }
    .screen { position: relative; }
    .device.handheld .screen { border-radius: 30px; overflow: hidden; background: #aed3ea; }
    .device.handheld.tablet .screen { border-radius: 14px; }

    /* the app is inset into the area *between* the iOS chrome (status bar / home
       indicator), so app content physically can't sit under the camera — works in every
       browser with no dependency on the app reading insets. The iframe is a replaced
       element (won't stretch to top/bottom:0), so a wrapper div carries the inset. */
    .frame-wrap { position: absolute; inset: 0; overflow: hidden; }
    .frame-wrap iframe { width: 100%; height: 100%; display: block; border: 0; background: #aed3ea; }

    .statusbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 3;
      display: none; align-items: center; justify-content: space-between;
      padding: 0 28px; color: #0a1722; pointer-events: none;
      font-weight: 650; font-size: 15px; letter-spacing: 0.2px; font-variant-numeric: tabular-nums;
    }
    .sb-right { display: flex; align-items: center; gap: 7px; }
    .sb-right svg { display: block; }
    /* Dynamic Island */
    .island {
      display: none; position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 122px; height: 34px; background: #000; border-radius: 999px; z-index: 4;
    }
    .device.notch .island { display: block; }
    .device.landscape .island { display: none; }
    .homebar {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 3;
      display: none; align-items: flex-end; justify-content: center; pointer-events: none;
    }
    .home-indicator { width: 36%; max-width: 140px; height: 5px; margin-bottom: 8px; border-radius: 999px; background: #0a1722; opacity: 0.82; }

    @media (prefers-color-scheme: dark) {
      .device.handheld .screen, .frame-wrap iframe { background: #16222e; }
      .statusbar { color: #eef2f6; }
      .home-indicator { background: #eef2f6; }
    }

    @media (max-width: 560px) {
      .toolbar { gap: 10px; padding: 8px 12px; }
      .group .lbl, .brand .tag, .dims { display: none; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="brand">Travel Tracker <span class="tag">dev preview</span></span>

    <div class="group">
      <span class="lbl">Device</span>
      <div class="seg" id="devices"></div>
    </div>

    <div class="group">
      <button class="iconbtn" id="rotate" title="Rotate" aria-label="Rotate">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 9a8 8 0 0 1 14-3m0 0V3m0 3h-3M20 15a8 8 0 0 1-14 3m0 0v3m0-3h3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="iconbtn" id="reload" title="Reload frame" aria-label="Reload">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M20 11a8 8 0 1 0-.6 4M20 5v6h-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <span class="spacer"></span>
    <span class="dims" id="dims"></span>
    <a class="raw" href="index.html" target="_blank" rel="noopener">Open raw ↗</a>
  </div>

  <div class="stage" id="stage">
    <div class="sizer" id="sizer">
      <div class="device" id="device">
        <div class="screen">
          <div class="statusbar" id="statusbar">
            <span class="sb-time">9:41</span>
            <span class="sb-right">
              <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor" aria-hidden="true"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5.5" width="3" height="6.5" rx="1"/><rect x="10" y="3" width="3" height="9" rx="1"/><rect x="15" y="0.5" width="3" height="11.5" rx="1"/></svg>
              <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor" aria-hidden="true"><path d="M8.5 2C5.4 2 2.6 3.1.6 5.1l1.4 1.4C3.7 4.8 6 4 8.5 4s4.8.8 6.5 2.5l1.4-1.4C14.4 3.1 11.6 2 8.5 2z"/><path d="M8.5 6.1c-1.6 0-3 .6-4.1 1.7l1.5 1.5c.7-.7 1.6-1.1 2.6-1.1s1.9.4 2.6 1.1l1.5-1.5C11.5 6.7 10.1 6.1 8.5 6.1z"/><circle cx="8.5" cy="10.3" r="1.4"/></svg>
              <svg width="28" height="13" viewBox="0 0 28 13" aria-hidden="true"><rect x="0.6" y="1" width="23" height="11" rx="3" fill="none" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2.5" width="17" height="8" rx="1.8" fill="currentColor"/><rect x="25" y="4.5" width="2.2" height="4" rx="1" fill="currentColor" fill-opacity="0.5"/></svg>
            </span>
          </div>
          <div class="island" aria-hidden="true"></div>
          <div class="frame-wrap" id="frame-wrap"><iframe id="frame" title="App preview"></iframe></div>
          <div class="homebar" id="homebar"><div class="home-indicator"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // safe = portrait safe-area insets (px) injected into the app so it clears the
    // status bar / Dynamic Island, exactly like a real device in standalone mode.
    const DEVICES = [
      { id: "desktop",  label: "Desktop",      w: 1280, h: 800,  kind: "desktop", notch: false, safe: { top: 0,  bottom: 0,  side: 0 } },
      { id: "se",       label: "iPhone SE",    w: 375,  h: 667,  kind: "phone",   notch: false, safe: { top: 20, bottom: 0,  side: 0 } },
      { id: "pro",      label: "iPhone 15 Pro",w: 393,  h: 852,  kind: "phone",   notch: true,  safe: { top: 59, bottom: 34, side: 0 } },
      { id: "ipad",     label: "iPad mini",    w: 744,  h: 1133, kind: "tablet",  notch: false, safe: { top: 24, bottom: 20, side: 0 } },
    ];
    const STORE = "tt-dev:device";
    const segEl = document.getElementById("devices");
    const deviceEl = document.getElementById("device");
    const sizerEl = document.getElementById("sizer");
    const screenEl = deviceEl.querySelector(".screen");
    const stageEl = document.getElementById("stage");
    const frameEl = document.getElementById("frame");
    const dimsEl = document.getElementById("dims");
    const rotateBtn = document.getElementById("rotate");

    let current = DEVICES.find(d => d.id === localStorage.getItem(STORE)) || DEVICES[2];
    let landscape = false;

    for (const d of DEVICES) {
      const b = document.createElement("button");
      b.textContent = d.label;
      b.dataset.id = d.id;
      b.addEventListener("click", () => { current = d; landscape = false; apply(); });
      segEl.append(b);
    }

    rotateBtn.addEventListener("click", () => { landscape = !landscape; apply(); });
    const sbEl = document.getElementById("statusbar");
    const hbEl = document.getElementById("homebar");
    const wrapEl = document.getElementById("frame-wrap");
    // Safe-area insets, used to PHYSICALLY reserve the iOS chrome and inset the app —
    // browser/cache-proof, no reliance on the app reading the insets itself.
    function currentInsets() {
      const s = current.safe;
      return landscape
        ? { top: 0, right: s.top, bottom: s.bottom ? 21 : 0, left: s.top }
        : { top: s.top, right: s.side, bottom: s.bottom, left: s.side };
    }
    const frameURL = () => "index.html?v=" + Date.now();
    frameEl.src = frameURL();
    document.getElementById("reload").addEventListener("click", () => { frameEl.src = frameURL(); });
    new ResizeObserver(fit).observe(stageEl);
    window.addEventListener("resize", fit);
    frameEl.addEventListener("load", fit);
    if (document.fonts) document.fonts.ready.then(fit);

    function apply() {
      localStorage.setItem(STORE, current.id);
      for (const b of segEl.children) b.classList.toggle("active", b.dataset.id === current.id);

      const handheld = current.kind !== "desktop";
      rotateBtn.disabled = !handheld;
      deviceEl.className = "device "
        + (handheld ? "handheld" : "desktop")
        + (current.kind === "tablet" ? " tablet" : "")
        + (current.notch ? " notch" : "")
        + (handheld && landscape ? " landscape" : "");

      let w = current.w, h = current.h;
      if (handheld && landscape) [w, h] = [h, w];
      screenEl.style.width = w + "px";
      screenEl.style.height = h + "px";
      dimsEl.textContent = `${w} × ${h}`;

      const ins = currentInsets();
      sbEl.style.height = ins.top + "px";
      sbEl.style.display = ins.top ? "flex" : "none";
      hbEl.style.height = ins.bottom + "px";
      hbEl.style.display = ins.bottom ? "flex" : "none";
      // status bar reserves space (app sits below it); the home indicator instead floats
      // *over* the app — like real iOS — so bottom sheets fill to the very edge.
      wrapEl.style.top = ins.top + "px";
      wrapEl.style.bottom = "0px";
      wrapEl.style.left = ins.left + "px";
      wrapEl.style.right = ins.right + "px";

      fit();
    }

    // Scale the device to fit the stage, then size the wrapper to the *scaled*
    // footprint so flexbox centers the visual device (transforms don't change layout
    // size). Guarantees the whole frame is always on-screen, however short the window.
    function fit() {
      deviceEl.style.transform = "none";
      const fullW = deviceEl.offsetWidth;
      const fullH = deviceEl.offsetHeight;
      if (!fullW || !fullH) return;
      const avW = Math.max(0, stageEl.clientWidth - 48);
      const avH = Math.max(0, stageEl.clientHeight - 48);
      const scale = Math.min(1, avW / fullW, avH / fullH);
      deviceEl.style.transform = `scale(${scale.toFixed(4)})`;
      sizerEl.style.width = Math.ceil(fullW * scale) + "px";
      sizerEl.style.height = Math.ceil(fullH * scale) + "px";
    }

    apply();
    requestAnimationFrame(fit);
  </script>
</body>
</html>
